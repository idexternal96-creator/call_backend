<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login · Call AutoTerminate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
</head>

<body>

    <div class="login-bg">
        <div class="login-card">

            <div class="login-brand">
                <div class="login-brand-icon">📵</div>
                <div>
                    <div class="login-brand-name">Call AutoTerminate</div>
                    <div class="login-brand-sub">Admin Dashboard</div>
                </div>
            </div>

            <h1>Welcome back</h1>
            <p class="sub">Sign in to manage your auto-rejection system</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="admin" autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                        required />
                </div>

                <button type="submit" id="loginBtn" class="btn-submit">
                    <span id="btnText">Sign In</span>
                    <div class="spinner" id="spinner"></div>
                </button>

                <div class="alert alert-error" id="errorBox"></div>
            </form>

        </div>
    </div>

    <script type="module" src="./assets/js/login.js"></script>
</body>

</html>
